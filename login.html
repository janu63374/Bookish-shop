<!DOCTYPE html>
<html>
<head>
    <title>Login - Bookish Shop</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body{
            background-color:rgb(202, 195, 195);
        }
        .form-container{
            width:350px;
            margin:100px auto;
            padding:40px;
            background:white;
            box-shadow:0 10px 25px gray;
            border-radius:10px;
            text-align:center;
        }

        input{
            width:100%;
            padding:10px;
            margin:10px 0;
        }

        .form-btn{
            background:black;
            color:white;
            padding:10px;
            border:none;
            cursor:pointer;
            border-radius:6px;
        }

        .form-btn:hover{
            background:gray;
        }
        #home{
            text-decoration:none;
            color:white;
            padding:10px;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Login</h2>

    <input type="email" id="loginEmail" placeholder="Enter Email" autocomplete="off">
    <input type="password" id="loginPassword" placeholder="Enter Password" autocomplete="new-password">

    <button class="form-btn" onclick="login()">Login</button>
    <button class="form-btn"><a href="index.php" id="home">Home</a></button>

    <p>Don't have account? <a href="register.html">Register</a></p>

</div>

<script>
function login(){
    let email = document.getElementById("loginEmail").value;
    let password = document.getElementById("loginPassword").value;

    if(email === "" || password === ""){
        alert("Please fill all fields");
    }else{
        alert("Login Successful");
        window.location.href = "index.php";
    }
}
</script>

</body>
</html>
